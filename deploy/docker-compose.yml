version: "3.9"
services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports: ["8000:8080"]
    env_file: ../.env
    volumes: ["../data:/app/data"]

  ui:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ui
    ports: ["8501:8080"]
    env_file: ../.env
    depends_on: [api]
    volumes: ["../data:/app/data"]

  mcp-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["python", "tools/mcp_server.py"]
    ports: ["8765:8765"]
    env_file: ../.env
    volumes: ["../data:/app/data"]
