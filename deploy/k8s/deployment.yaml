apiVersion: apps/v1
kind: Deployment
metadata:
  name: ap-sentinel-api
  labels: {app: ap-sentinel-api}
spec:
  replicas: 2
  selector:
    matchLabels: {app: ap-sentinel-api}
  template:
    metadata:
      labels: {app: ap-sentinel-api}
    spec:
      containers:
        - name: api
          image: gcr.io/PROJECT_ID/ap-sentinel-api:latest
          ports: [{containerPort: 8080}]
          envFrom:
            - secretRef: {name: ap-sentinel-secrets}
          resources:
            requests: {cpu: "250m", memory: "512Mi"}
            limits: {cpu: "1", memory: "1Gi"}
          readinessProbe:
            httpGet: {path: /health, port: 8080}
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: {path: /health, port: 8080}
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ap-sentinel-api-svc
spec:
  selector: {app: ap-sentinel-api}
  ports: [{port: 80, targetPort: 8080}]
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ap-sentinel-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ap-sentinel-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: {type: Utilization, averageUtilization: 70}
